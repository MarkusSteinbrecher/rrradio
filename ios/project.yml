name: rrradio
options:
  bundleIdPrefix: org.rrradio
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: org.rrradio.ios

targets:
  rrradio:
    type: application
    platform: iOS
    sources:
      - path: rrradio
        excludes:
          - "Info.plist"
    resources:
      - path: rrradio/Resources/Assets.xcassets
    info:
      path: rrradio/Resources/Info.plist
      properties:
        CFBundleDisplayName: rrradio
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        # Background audio so streams keep playing when the app
        # is backgrounded or the screen is locked.
        UIBackgroundModes: [audio]
        # ATS exceptions — by default iOS enforces HTTPS-only for all
        # network requests; this block opens that up only for the two
        # specific HTTP hosts on the catalog's `httpAllowed: true`
        # allowlist (data/stations.yaml, audit #71). Everything else
        # stays HTTPS-only via the iOS default — there's nothing to
        # enforce here.
        #
        # The two hosts: shoutcast.rtvc.gov.co (RTVC, Colombian public
        # broadcaster) and 162.244.80.52 (Akaboozi FM, Uganda) — both
        # are origin servers that simply don't serve HTTPS.
        #
        # Use per-host NSExceptionDomains entries rather than
        # NSAllowsArbitraryLoads. Apple scrutinizes the latter and asks
        # for justification in App Review submission notes; per-host
        # exceptions usually pass without follow-up.
        NSAppTransportSecurity:
          NSExceptionDomains:
            shoutcast.rtvc.gov.co:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
            162.244.80.52:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIViewControllerBasedStatusBarAppearance: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  # XCTest target — covers the parts of the iOS app that don't need a
  # SwiftUI host: catalog decoding, cache fallback, search matching, and
  # the AudioPlayer's idle-state contract. Real AVPlayer behaviour is
  # not tested here (no audio device on CI).
  rrradioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: rrradioTests
    dependencies:
      - target: rrradio
    # TEST_HOST + BUNDLE_LOADER are set automatically by xcodegen when
    # there's a target: dependency on the host app.

schemes:
  rrradio:
    build:
      targets:
        rrradio: all
        rrradioTests: [test]
    test:
      targets:
        - rrradioTests
      gatherCoverageData: true
