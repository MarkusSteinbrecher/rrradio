name: rrradio
options:
  bundleIdPrefix: org.rrradio
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: org.rrradio.ios

targets:
  rrradio:
    type: application
    platform: iOS
    sources:
      - path: rrradio
        excludes:
          - "Info.plist"
    resources:
      - path: rrradio/Resources/Assets.xcassets
    info:
      path: rrradio/Resources/Info.plist
      properties:
        CFBundleDisplayName: rrradio
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Background audio so streams keep playing when the app
        # is backgrounded or the screen is locked.
        UIBackgroundModes: [audio]
        # ATS: HTTPS-only catalog policy enforced by tools/check-catalog.mjs
        # (audit #71). Stations with `httpAllowed: true` in stations.yaml
        # are HTTP-only — they need per-host NSExceptionDomains entries
        # below. Today the allowlist is shoutcast.rtvc.gov.co (RTVC,
        # Colombian public broadcaster) and 162.244.80.52 (Akaboozi FM,
        # Uganda). NEVER set NSAllowsArbitraryLoads — App Review will
        # reject without explicit per-host justification.
        NSAppTransportSecurity:
          NSExceptionDomains:
            shoutcast.rtvc.gov.co:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
            162.244.80.52:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIViewControllerBasedStatusBarAppearance: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
