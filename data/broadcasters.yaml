# ─────────────── Portugal ───────────────

rtp:
  name: RTP
  fullName: Rádio e Televisão de Portugal
  country: PT
  homepage: https://www.rtp.pt/play/radio
  notes: |
    Portuguese public broadcaster. Antena 1/2/3 streams ship via
