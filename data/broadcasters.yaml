# ─────────────── Denmark ───────────────

dr:
  name: DR
  fullName: Danmarks Radio
  country: DK
  homepage: https://www.dr.dk/lyd
  notes: |
    Danish public broadcaster. RB stores http://live-icy.gslb01.dr.dk/A/A<NN>H.mp3
