  country: CH
  family: SRG-SSR
  homepage: https://www.rts.ch/audio-podcasts/
  metadata: srgssr-il
  notes: |
    SRG SSR — French-language Swiss public.
    Track-level via the SRG SSR Integration Layer at
    il.srf.ch/integrationlayer/2.0/rts/songList/radio/byChannel/<HEX>.json
    (CORS open). Migrated from the hummingbird.rts.ch programme-only
    proxy in 2026-05.

rsi:
  name: RSI
  fullName: Radiotelevisione svizzera
  country: CH
  family: SRG-SSR
  homepage: https://www.rsi.ch/
  metadata: srgssr-il
