# rrradio broadcaster catalog
#
# One entry per organisation. Stations reference a broadcaster by its
# top-level key (br, orf, …) and inherit `metadata`, `country`, `homepage`
# unless they override. New broadcasters get added here when their
# metadata API is researched and a fetcher is wired in src/builtins.ts.
#
# Required: name, country, homepage
# Optional: family (umbrella org like ARD), metadata (fetcher key),
#           notes (free-form context)
#
# Status of metadata work is tracked per-station in stations.yaml.

# ─────────────── German-speaking ───────────────

grrif:
  name: Grrif
  country: CH
  homepage: https://www.grrif.ch
  metadata: grrif

orf:
  name: ORF
  fullName: Österreichischer Rundfunk
  country: AT
  homepage: https://radiothek.orf.at
  metadata: orf
  notes: |
    Single fetcher serves every channel via audioapi.orf.at/<key>/api/json/4.0/live.
    Each station declares its metadataUrl pointing at the right channel.

br:
  name: BR
  fullName: Bayerischer Rundfunk
  country: DE
  family: ARD
  homepage: https://www.br.de/radio
  metadata: br-radioplayer
  notes: |
    radioplayer.json endpoint per channel under www.br.de/mediathek/audio/.
    Body starts with `//@formatter:off` — fetcher strips leading non-JSON.

# ARD members — fetchers TBD (each has its own now-playing API shape)
wdr:
  name: WDR
  fullName: Westdeutscher Rundfunk
  country: DE
  family: ARD
  homepage: https://www1.wdr.de/radio/
  notes: TBD — has own onair API, different from BR

ndr:
  name: NDR
  fullName: Norddeutscher Rundfunk
  country: DE
  family: ARD
  homepage: https://www.ndr.de/

mdr:
  name: MDR
  fullName: Mitteldeutscher Rundfunk
  country: DE
  family: ARD
  homepage: https://www.mdr.de/
  notes: |
    ARD — public broadcaster for Saxony / Saxony-Anhalt / Thuringia.
    Two URL patterns share the same `Songs` JSON shape: simple
    `/XML/titellisten/<slug>_onair.json` (works for jump + sputnik
    only — current track), and `/scripts4/titellisten/xmlresp-index.do?
    idwelle=<id>&amount=N` (the rest — full day's playlist; fetcher
    auto-appends &startdate=today). CORS open; no proxy needed.

    `metadata: mdr` is set per-station rather than at the broadcaster
    level so channels without a known metadataUrl can still fall
    through to icyFetcher at status: icy-only. Setting it on the
    broadcaster would force every MDR station to use fetchMdrMetadata
    and lose the ICY fallback for unwired channels.

    Stream URLs: prefer the sslcast.mdr.de HTTPS hosts
    (mdr-<channelID>-0.sslcast.mdr.de/mdr/<channelID>/0/mp3/high/stream.mp3)
    over the akamaized HLS variants — sslcast emits ICY-over-HTTPS so
    the stream itself is icy-only-grade even when no metadataUrl is
    wired. Channel IDs: Sachsen=284280, Sachsen-Anhalt=284290,
    Thüringen=284300, Jump=284320, Sputnik=284330, Aktuell=284340,
    Klassik=284350, Schlagerwelt=990701, Tweens=991101.

    Known idwelles (xmlresp): Aktuell=2, Sachsen=4, Thüringen=6, Klassik=7.
    Schlagerwelt + Tweens + Sachsen-Anhalt idwelles unconfirmed —
    those ship at icy-only via the sslcast stream.

swr:
  name: SWR
  fullName: Südwestrundfunk
  country: DE
  family: ARD
  homepage: https://www.swr.de/
  metadata: swr
  notes: |
    ARD — public broadcaster for Baden-Württemberg / Rhineland-Palatinate.
    Playerbar JSON at swr.de/~webradio/.../<channel>-playerbar-100~playerbarContainer.json.
    CORS open. Richest payload of the German public broadcasters: track +
    cover + program + presenter in a single response. SWR4 has 13+ regional
    sub-stations under different paths.

hr:
  name: HR
  fullName: Hessischer Rundfunk
  country: DE
  family: ARD
  homepage: https://www.hr.de/
  metadata: hr
  notes: |
    Each HR channel publishes a radioplayer.json with the day's
    broadcasts (no track titles — those come from ICY). No CORS, so
    fetched via the rrradio-stats Worker proxy. metadataUrl on each
    station holds the full radioplayer.json URL; wire-metadata
    derives it from the channel's homepage.

rbb:
  name: RBB
  fullName: Rundfunk Berlin-Brandenburg
  country: DE
  family: ARD
  homepage: https://www.rbb-online.de/

sr:
  name: SR
  fullName: Saarländischer Rundfunk
  country: DE
  family: ARD
  homepage: https://www.sr.de/
  metadata: sr
  notes: |
    sr.de/sr/epg/nowPlaying.jsp?welle=<sr1|sr2|sr3|antenne|unserding>
    returns programme-level JSON (titel + moderator + slot times, no
    track data). No CORS — routed via worker proxy.

rb:
  name: Radio Bremen
  country: DE
  family: ARD
  homepage: https://www.radiobremen.de/
  metadata: rb-bremen
  notes: |
    Per-channel programme JSON at <channel>.de/<page>~ajax_ajaxType-epg.json
    (channels: bremeneins, bremenzwei, bremenvier, bremennext). Programme-
    level only — no track titles in the live feed; playlistPrevious has
    past tracks but no current. No CORS — routed via worker proxy.

dlf:
  name: Deutschlandradio
  country: DE
  homepage: https://www.deutschlandradio.de/
  notes: Deutschlandfunk + DLF Kultur + DLF Nova share an API

# ─────────────── German commercial / independent ───────────────

rock-antenne:
  name: Rock Antenne
  country: DE
  homepage: https://www.rockantenne.de/
  metadata: antenne
  notes: |
    Bavarian rock-format commercial broadcaster, multiple themed
    sub-channels. Same vendor/API as Antenne Bayern: a single endpoint
    at rockantenne.de/api/metadata/now returns ALL sub-channels in one
    response. Per-station metadataUrl carries the API URL with the
    channel mountpoint as the URL hash (e.g. .../now#heavy-metal).
    No CORS — routed via worker proxy.

antenne-bayern:
  name: Antenne Bayern
  country: DE
  homepage: https://www.antenne.de/
  metadata: antenne
  notes: |
    Largest commercial broadcaster in Bavaria. Single API endpoint
    at antenne.de/api/metadata/now returns 37 sub-channels (Chillout,
    Lounge, Lovesongs, Top 40, decade-themed, etc.). Per-station
    metadataUrl carries the API URL with the mountpoint as the hash
    (e.g. .../now#chillout). No CORS — routed via worker proxy. The
    same fetcher serves Rock Antenne and Oldie Antenne via the
    matching per-broadcaster endpoint URL.

oldie-antenne:
  name: Oldie Antenne
  country: DE
  homepage: https://www.oldie-antenne.de/
  metadata: antenne
  notes: |
    Bavarian oldies station — re-served via the Antenne Bayern API
    endpoint (mountpoint=oldie-antenne under www.antenne.de/api/metadata/now).
    Same fetcher as antenne-bayern + rock-antenne.

absolut:
  name: Absolut Radio
  country: DE
  homepage: https://absolutradio.de/
  notes: Family of digital-only stations (Absolut Top, Relax, Bella, etc.)

byte-fm:
  name: ByteFM
  country: DE
  homepage: https://www.byte.fm/
  notes: Hamburg-based listener-supported indie / non-mainstream music

jazzradio-berlin:
  name: JazzRadio 106.8 Berlin
  country: DE
  homepage: http://www.jazzradio.net/

laut-fm:
  name: Laut.FM
  country: DE
  homepage: https://laut.fm/
  metadata: laut-fm
  notes: |
    Community-radio platform hosting thousands of small German
    stations. Public API at api.laut.fm/station/<slug>/current_song
    (CORS open). Per-station metadataUrl in YAML carries the slug
    (e.g. "mangoradio"), not the full URL — keeps YAML small and
    matches the FFH mountpoint pattern.

klassik-radio:
  name: Klassik Radio
  country: DE
  homepage: https://www.klassikradio.de/
  metadata: streamabc
  notes: |
    Commercial classical broadcaster (Augsburg). Now-playing via the
    streamabc.net metadata-as-a-service platform: api.streamabc.net/
    metadata/channel/<channelkey>.json — main station is "klassikr-live".
    Multiple sub-channels (Movie, Pure Klassik, Lounge, ...) each have
    their own channelkey. CORS open. Exposes album / conductor (extdata.dirigent) /
    ensemble / soloist — folded into the program subtitle.

ffh:
  name: FFH
  fullName: Hit Radio FFH
  country: DE
  homepage: https://www.ffh.de/
  metadata: ffh
  notes: |
    Commercial broadcaster (Hesse). One endpoint at ffh.de/update-onair-info
    returns an array of all FFH-family channels in a single response (FFH
    + harmony.fm + planet radio + ffhplus<*> sub-brands). Each station's
    metadataUrl in YAML is the mountpoint key (e.g. "ffh", "ffhplus80er")
    rather than a URL — keeps YAML small. CORS open. cHash query param is
    static — re-discover via discover-metadata-api if it ever rotates.

