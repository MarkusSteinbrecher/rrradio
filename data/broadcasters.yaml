# ─────────────── UK ───────────────

bbc:
  name: BBC
  country: UK
  homepage: https://www.bbc.co.uk/sounds
  metadata: bbc
  notes: |
    rms.api.bbc.co.uk gates by Origin: bbc.co.uk — proxied through
    rrradio-stats Worker (/api/public/bbc/{schedule,play}/<service>).
    metadataUrl on each station stores the BBC service slug
    (e.g. bbc_world_service); wire-metadata derives it from streamUrl.

# ─────────────── France ───────────────

radio-france:
  name: Radio France
  country: FR
  homepage: https://www.radiofrance.fr/
  notes: France Inter, France Culture, France Musique, FIP, Mouv'

# ─────────────── Netherlands ───────────────

npo:
  name: NPO
  fullName: Nederlandse Publieke Omroep
  country: NL
  homepage: https://nporadio.nl/

# ─────────────── Italy ───────────────

rai:
  name: RAI
  fullName: Radio Audizioni Italiane
  country: IT
  homepage: https://www.raiplaysound.it/

# ─────────────── Poland ───────────────

polskie-radio:
  name: Polskie Radio
  fullName: Polskie Radio S.A.
  country: PL
  homepage: https://www.polskieradio.pl/
  notes: |
    Polish public broadcaster. The legacy port-numbered URLs at
    stream3.polskieradio.pl:88xx are HTTP-only and broken-mixed in RB.
    HTTPS HLS lives at stream<N>.polskieradio.pl/pr<X>/pr<X>.sdp/playlist.m3u8
    for PR2 (stream12), PR3 (stream13), PR4 (stream14), PR24 (stream15).
    PR1 / Jedynka has no clean HLS endpoint outside the Next.js player.

# ─────────────── Hungary ───────────────

mr:
  name: MR
  fullName: Magyar Rádió
  country: HU
  homepage: https://radio.hu/
  metadata: mr
  notes: |
    mediaklikk.hu/iface XML feeds: /radio_now/now_<id>.xml (only
    Dankó id=9 returns track-level data; the others 404) and
    /broadcast/<date>/broadcast_<id>.xml (all channels). CORS=*.
    metadataUrl on each station holds the radio_now URL; schedule
    URL is derived from <id>.

# ─────────────── Czechia ───────────────

cro:
  name: ČRo
  fullName: Český rozhlas
  country: CZ
  homepage: https://rozhlas.cz/
  metadata: cro
  notes: |
    api.rozhlas.cz/data/v2 endpoints — /playlist/now/<slug>.json,
    /playlist/day/<slug>.json (fallback when now is "quiet"),
    /schedule/day/<slug>.json. CORS=*. metadataUrl on each station
    is the /playlist/now/ URL; schedule URL is derived from it.

# ─────────────── Croatia ───────────────

hrt:
  name: HRT
  fullName: Hrvatska radiotelevizija
  country: HR
  homepage: https://radio.hrt.hr/

# ─────────────── Romania ───────────────

srr:
  name: SRR
  fullName: Societatea Română de Radiodifuziune
  country: RO
  homepage: https://www.srr.ro/
  metadata: srr
  notes: |
    Single endpoint romania-actualitati.ro/api/live.php returns all
    stations keyed by numeric id (1=Actualități, 2=Cultural, 5=Muzical).
    Program-only — title + schedule string, no track. CORS=*.
    metadataUrl on each station is "<live.php URL>#<id>".

# ─────────────── Slovakia ───────────────

rtvs:
  name: RTVS
  fullName: Rozhlas a televízia Slovenska
  country: SK
  homepage: https://www.rtvs.sk/radio

# ─────────────── Belgium ───────────────

vrt:
  name: VRT
  fullName: Vlaamse Radio- en Televisieomroeporganisatie
  country: BE
  homepage: https://radioplus.be/
  notes: |
    Flemish (Dutch-language) public broadcaster. Streams ship via
    icecast.vrtcdn.be/<slug>-high.mp3 — RB stored http:// for the
