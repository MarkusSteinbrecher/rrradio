    API: api.radioswiss{pop,jazz,classic}.ch/api/v1/<short>/<locale>/playlist_small.
    No CORS — proxied through worker. Cover URLs at
    cdne-satr-prd-rsp-covers.azureedge.net/50/<coverId>.jpg.

rtr:
  name: RTR
  fullName: Radiotelevisiun Svizra Rumantscha
  country: CH
  family: SRG-SSR
  homepage: https://www.rtr.ch/
  metadata: srgssr-il
  notes: |
    SRG SSR — Romansh-language Swiss public.
    Track-level via the SRG SSR Integration Layer
    (il.srf.ch/integrationlayer/2.0/rtr/songList/radio/byChannel/<id>.json).
    CORS-callable directly. The same fetcher works for SRF/RSI/RTS too
    via different BU prefixes — SRF/RSI/RTS still on their per-BU
    fetchers for now; consolidating would simplify (see follow-up issue).

