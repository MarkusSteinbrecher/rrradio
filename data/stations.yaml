# rrradio station catalog — source of truth
#
# Each entry references a broadcaster (see data/broadcasters.yaml) and
# adds the station-specific bits: stream URL, codec, bitrate, channel-
# specific metadata URL, logo path. Status determines whether the
# station ships in the bundled public/stations.json.
#
# Required fields: id, broadcaster, name, streamUrl, status
# Optional:        bitrate, codec, tags, favicon, homepage, country,
#                  metadataUrl, featured, notes
#
# Inheritance: country, homepage and the metadata-fetcher key are
# inherited from the broadcaster unless the station overrides.
#
# Status taxonomy
#   working      — stream + metadata + cover all flowing → in catalog
#   stream-only  — plays, no metadata → in catalog without rich data
#   icy-only     — plays, ICY-over-fetch supplies title → in catalog
#   fetcher-todo — broadcaster API known, fetcher not yet wired
#   investigate  — to research
#   not-public   — auth/session/geo locked, will not work
#   broken       — URL dead or stream consistently fails
# Only `working`, `stream-only`, `icy-only` are emitted into the
# bundled public/stations.json.

