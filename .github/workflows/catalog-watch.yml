name: Catalog watch

# Weekly health check of the station catalog. Probes every published
# station's stream + metadataUrl, and surfaces curation candidates
# from GoatCounter top-plays. When something needs attention, opens
# (or updates) a single tracking issue labelled `catalog-watch`. When
# everything's clean, auto-closes that issue.

on:
  schedule:
    - cron: '0 7 * * 1' # Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Validate catalog
        id: validate
        run: |
          set +e
          npm run validate-catalog > validate.txt 2>&1
          EXIT=$?
          cat validate.txt
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          if [ "$EXIT" -ne 0 ]; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show curation candidates
        run: npm run candidates 2>&1 | tee candidates.txt

      - name: Refresh station backlog (analyzed candidates)
        run: |
          npm run backlog
          # Commit the regenerated JSON straight to main if it changed —
          # the dashboard reads it on next page load. Single weekly
          # commit, no PR overhead.
          if git diff --quiet public/station-backlog.json; then
            echo "Backlog unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/station-backlog.json
            git commit -m "Catalog-watch: refresh station backlog"
            git push origin main
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Auto-curate (Radio Browser → YAML stubs)
        id: curate
        run: |
          # Skip if a previous auto-curate PR is still open — avoids
          # piling up stacked PRs that all touch the same file.
          OPEN_PR=$(gh pr list --label auto-curate --state open --json number --jq '.[0].number // ""')
          if [ -n "$OPEN_PR" ]; then
            echo "Open auto-curate PR #$OPEN_PR — skipping import this run."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npm run auto-curate 2>&1 | tee curate.txt
          if git diff --quiet data/stations.yaml; then
            echo "No new stations imported."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Open auto-curate PR
        if: steps.curate.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create auto-curate \
            --description "Auto-imported station stubs awaiting review" \
            --color 0E8A16 --force >/dev/null 2>&1 || true

          BRANCH="auto/curate-$(date -u +'%Y%m%d-%H%M')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/stations.yaml
          git commit -m "Auto-curate: import top-played stations from Radio Browser"
          git push origin "$BRANCH"

          {
            echo "Imported by the weekly catalog-watch workflow."
            echo "Each entry is at \`status: stream-only\` — plays straightforwardly via ICY,"
            echo "no broadcaster-specific metadata fetcher wired yet."
            echo
            echo "**Review checklist before merging**"
            echo "- [ ] Station name / stream URL look right"
            echo "- [ ] Tags + country make sense"
            echo "- [ ] favicon URL renders something usable (otherwise drop the line)"
            echo "- [ ] If the broadcaster has a metadata API worth wiring, change \`broadcaster: independent\`"
            echo "      to a real entry (or add one to \`data/broadcasters.yaml\`) and bump status to \`working\`"
            echo
            echo "### auto-curate output"
            echo
            echo '```'
            cat curate.txt
            echo '```'
          } > pr-body.md

          NEW_COUNT=$(grep -cE '^  \+ ' curate.txt || echo 0)
          gh pr create \
            --title "Auto-curate: import ${NEW_COUNT} station(s) from Radio Browser" \
            --label auto-curate \
            --body-file pr-body.md \
            --head "$BRANCH" \
            --base main

      - name: Open or update tracking issue
        if: steps.validate.outputs.has_issues == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create catalog-watch \
            --description "Weekly station validation surfaced something to look at" \
            --color B60205 --force >/dev/null 2>&1 || true

          {
            echo "Last run: $(date -u +'%Y-%m-%d %H:%M UTC')  ·  [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo
            echo "### validate-catalog"
            echo
            echo '```'
            cat validate.txt
            echo '```'
            echo
            echo "### candidates (top played, not curated)"
            echo
            echo '```'
            cat candidates.txt
            echo '```'
          } > body.md

          NUM=$(gh issue list --label catalog-watch --state open --json number --jq '.[0].number // ""')
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body-file body.md
            gh issue comment "$NUM" --body "Re-checked $(date -u +'%Y-%m-%d %H:%M UTC') — still has issues. Body updated."
          else
            gh issue create \
              --title "Catalog watch: stations need attention" \
              --label catalog-watch \
              --body-file body.md
          fi

      - name: Close tracking issue if all clean
        if: steps.validate.outputs.has_issues != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NUM=$(gh issue list --label catalog-watch --state open --json number --jq '.[0].number // ""')
          if [ -n "$NUM" ]; then
            gh issue close "$NUM" --comment "All stations OK as of $(date -u +'%Y-%m-%d %H:%M UTC'). Closing."
          fi
