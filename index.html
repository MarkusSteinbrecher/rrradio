<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="rrradio" />
    <title>rrradio</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- ============== TOP BAR ============== -->
      <header class="topbar">
        <div class="topbar-row">
          <div class="wordmark">rrradio<span class="dot" aria-hidden="true"></span></div>
          <div class="signal-meta">
            <span class="live-dot" aria-hidden="true"></span>
            <span id="signal-status">STANDBY</span>
          </div>
        </div>

        <div class="search-wrap" id="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7" /><path d="m20 20-3.5-3.5" /></svg>
          <input
            type="search"
            id="search"
            class="search"
            placeholder="Search stations, genres, places…"
            autocomplete="off"
            aria-label="Search stations"
          />
        </div>

        <div class="tags" id="tags" role="toolbar" aria-label="Genre filters"></div>

        <div class="tab-status" id="tab-status" hidden></div>
      </header>

      <!-- ============== CONTENT ============== -->
      <main class="content" id="content"></main>

      <!-- ============== MINI PLAYER ============== -->
      <button class="mini" id="mini" type="button" hidden aria-label="Open now playing">
        <span class="mini-progress" aria-hidden="true"></span>
        <span class="fav" id="mini-fav" aria-hidden="true"></span>
        <span class="mini-info">
          <span class="mini-name" id="mini-name">—</span>
          <span class="mini-meta">
            <span class="live-dot" aria-hidden="true"></span>
            <span id="mini-meta">STANDBY</span>
          </span>
        </span>
        <span class="mini-toggle" id="mini-toggle" role="button" aria-label="Play / pause">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 4.5v15a.75.75 0 0 0 1.16.63l12-7.5a.75.75 0 0 0 0-1.27l-12-7.5A.75.75 0 0 0 7 4.5z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4.5" width="4" height="15" rx="0.5"/><rect x="14" y="4.5" width="4" height="15" rx="0.5"/></svg>
        </span>
      </button>

      <!-- ============== TAB BAR ============== -->
      <nav class="tabbar" id="tabbar" aria-label="Sections">
        <button type="button" class="tab-btn" data-tab="browse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></svg>
          Browse
        </button>
        <button type="button" class="tab-btn" data-tab="fav">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 17.5 6 21l1.5-6.5L2.5 10l6.7-.6L12 3l2.8 6.4 6.7.6-5 4.5L18 21z"/></svg>
          Favorites
        </button>
        <button type="button" class="tab-btn" data-tab="recent">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
          Recents
        </button>
      </nav>

      <!-- ============== NOW PLAYING (slide-up sheet) ============== -->
      <section class="np" id="np" aria-label="Now playing">
        <header class="np-head">
          <button type="button" class="icon-btn" id="np-close" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="np-label">Now Playing</div>
          <button type="button" class="icon-btn" aria-label="Share station" id="np-share">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v12"/><path d="m7 9 5-5 5 5"/><path d="M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/></svg>
          </button>
        </header>

        <div class="np-body">
          <div class="np-station">
            <div class="np-name" id="np-name">—</div>
            <div class="np-tags" id="np-tags"></div>
          </div>

          <div class="dial">
            <div class="dial-track" id="dial-track"></div>
            <div class="dial-edges" aria-hidden="true"></div>
            <div class="dial-mark" aria-hidden="true"></div>
          </div>

          <div class="np-freq">
            <span class="num" id="np-freq-num">—</span>
            <span class="unit">FM · MHZ</span>
          </div>

          <div class="np-meta">
            <div class="cell">
              <div class="k">Bitrate</div>
              <div class="v" id="np-bitrate">—</div>
            </div>
            <div class="cell">
              <div class="k">Origin</div>
              <div class="v" id="np-origin">—</div>
            </div>
            <div class="cell">
              <div class="k">Listeners</div>
              <div class="v" id="np-listeners">—</div>
            </div>
          </div>

          <div class="np-source">
            <a class="np-source__row" id="np-stream" href="#" target="_blank" rel="noopener noreferrer" hidden>
              <span class="np-source__k">Stream</span>
              <span class="np-source__v" id="np-stream-host">—</span>
              <svg class="np-source__ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 4h6v6"/><path d="M10 14 20 4"/><path d="M20 13v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5"/></svg>
            </a>
            <a class="np-source__row" id="np-home" href="#" target="_blank" rel="noopener noreferrer" hidden>
              <span class="np-source__k">Site</span>
              <span class="np-source__v" id="np-home-host">—</span>
              <svg class="np-source__ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 4h6v6"/><path d="M10 14 20 4"/><path d="M20 13v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h5"/></svg>
            </a>
          </div>
        </div>

        <div class="np-controls">
          <div class="np-row">
            <button type="button" class="np-btn" id="np-fav" aria-label="Favorite">
              <svg class="heart--line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.5-7 10-7 10z"/></svg>
              <svg class="heart--fill" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.5-7 10-7 10z"/></svg>
            </button>
            <div class="np-eq" id="np-eq" aria-hidden="true"></div>
            <button type="button" class="np-btn" id="np-sleep" aria-label="Sleep timer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M9 2h6"/></svg>
            </button>
          </div>

          <div class="np-play-row">
            <button type="button" class="np-play" id="np-play" aria-label="Play / pause">
              <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 4.5v15a.75.75 0 0 0 1.16.63l12-7.5a.75.75 0 0 0 0-1.27l-12-7.5A.75.75 0 0 0 7 4.5z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4.5" width="4" height="15" rx="0.5"/><rect x="14" y="4.5" width="4" height="15" rx="0.5"/></svg>
            </button>
          </div>

          <div class="np-bottom">
            <div class="live">
              <span class="live-dot" aria-hidden="true"></span>
              <span id="np-live-text">Standby</span>
            </div>
            <div id="np-format">— · —</div>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
