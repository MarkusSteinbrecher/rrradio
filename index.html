<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="rrradio" />
    <title>rrradio — late-night signal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body data-view="home">
    <!-- ============== HOME ============== -->
    <section class="view view--home" id="view-home" aria-label="Stations">
      <header class="masthead">
        <div class="masthead__row">
          <h1 class="brand-mark">rr<em>radio</em><span class="brand-mark__cursor"></span></h1>
          <span class="brand-tag">tonight&rsquo;s signal · ∞</span>
        </div>
        <div class="dial" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </header>

      <div class="search-field">
        <svg class="search-field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <path d="m20 20-3.6-3.6" />
        </svg>
        <input
          type="search"
          id="search"
          class="search-field__input"
          placeholder="search the airwaves"
          autocomplete="off"
          aria-label="Search stations"
        />
        <kbd class="search-field__hint" aria-hidden="true">live</kbd>
      </div>

      <div class="tag-row" id="tags" role="toolbar" aria-label="Genre filters"></div>

      <div class="section-label"><span>Now broadcasting</span></div>

      <ul class="station-list" id="station-list" aria-label="Stations"></ul>
      <p id="list-status" class="list-status">Tuning in…</p>

      <footer class="credit">Catalog · <span>radio-browser.info</span></footer>
    </section>

    <!-- ============== NOW PLAYING ============== -->
    <section class="view view--playing" id="view-playing" aria-label="Now playing">
      <header class="np-header">
        <button id="np-back" class="icon-btn" type="button" aria-label="Back to stations">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        </button>
        <span class="np-header__label">Now broadcasting</span>
        <span class="icon-btn icon-btn--ghost" aria-hidden="true"></span>
      </header>

      <div class="artwork">
        <div class="artwork__glow"></div>
        <div class="artwork__ring"></div>
        <div class="artwork__ring artwork__ring--inner"></div>
        <div class="artwork__frame" id="np-art">
          <span class="artwork__initials">··</span>
        </div>
      </div>

      <div class="np-meta">
        <div class="live-pill">
          <span class="live-pill__dot" aria-hidden="true"></span>
          <span class="live-pill__label">Live</span>
        </div>
        <h2 class="np-station" id="np-station">—</h2>
        <p class="np-tags" id="np-tags"></p>
      </div>

      <div class="np-track">
        <span class="np-track__label">on air</span>
        <span class="np-track__title" id="np-track">—</span>
      </div>

      <div class="np-controls">
        <button id="np-fav" class="icon-btn icon-btn--lg" type="button" aria-label="Favorite">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78Z"/></svg>
        </button>
        <button id="np-toggle" class="big-play" type="button" aria-label="Play / pause">
          <svg class="big-play__icon big-play__icon--play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5.14v13.72L19 12 8 5.14z"/></svg>
          <svg class="big-play__icon big-play__icon--pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
          <svg class="big-play__icon big-play__icon--load" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke-opacity="0.25"/>
            <path d="M21 12a9 9 0 0 0-9-9"/>
          </svg>
        </button>
        <button id="np-sleep" class="icon-btn icon-btn--lg" type="button" aria-label="Sleep timer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
          <span class="icon-btn__chip" id="np-sleep-chip" hidden></span>
        </button>
      </div>

      <p class="np-status" id="np-status">Idle</p>

      <p class="np-credit">freq · radio-browser.info</p>
    </section>

    <!-- ============== MINI PLAYER ============== -->
    <div id="mini-player" class="mini-player" hidden>
      <button id="mini-expand" class="mini-player__expand" type="button" aria-label="Open now playing">
        <span class="mini-player__art" id="mini-art" aria-hidden="true">
          <span class="mini-player__art-fallback" id="mini-art-fallback"></span>
        </span>
        <span class="mini-player__info">
          <span class="mini-player__name" id="mini-name">—</span>
          <span class="mini-player__status" id="mini-status">Idle</span>
        </span>
        <span class="mini-player__chev" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
        </span>
      </button>
      <button id="mini-toggle" class="mini-player__toggle" type="button" aria-label="Play / pause">
        <svg class="mini-player__icon mini-player__icon--play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5.14v13.72L19 12 8 5.14z"/></svg>
        <svg class="mini-player__icon mini-player__icon--pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
      </button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
