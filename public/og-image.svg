<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="rrradio - minimal browser internet radio">
  <title>rrradio - minimal browser internet radio</title>
  <!-- Source for public/og-image.png (the actual OG/Twitter image
       referenced from index.html). To regenerate the PNG after
       editing this file:

         qlmanage -t -s 1200 -o /tmp public/og-image.svg
         sips --cropToHeightWidth 630 1200 \
              /tmp/og-image.svg.png --out public/og-image.png

       qlmanage rasterizes the SVG into a 1200x1200 thumbnail with
       white padding above/below; sips center-crops down to the
       1200x630 OG ratio. Both tools ship with macOS - no external
       deps required.

       Dark background mirrors the dark-theme palette
       (#0a0a0a bg + #ffff00 accent) used by index.html and the favicon. -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Wordmark: yellow "rrr" + near-white "radio.org". The in-app
       wordmark uses spaced letters for atmosphere, but those spread
       too wide for an OG card across font fallbacks, so this version
       sets it solid. Centered horizontally and vertically within the
       1200x630 viewport with comfortable safe-area margins. -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <text x="600" y="300" font-size="160" font-weight="700">
      <tspan fill="#ffff00">rrr</tspan><tspan fill="#f4f4f4">adio.org</tspan>
    </text>
    <text x="600" y="380" font-size="36" font-weight="400" fill="#9a9a9a">
      minimal browser internet radio
    </text>
    <text x="600" y="470" font-size="22" font-weight="400" fill="#6a6a6a">
      no signup &#xb7; no app &#xb7; no tracking
    </text>
  </g>
</svg>
